<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container-fluid col-md-6 bg-white text-dark rounded p-3 mt-5">
        <h1>Member Sign-up</h1>
        <hr>
        <form>
            <h2>Student Details:</h2>
            <label for="name">Full Name:</label>
            <input type="text" id="name" placeholder="John Doe">
            <h2>Ticket Selection:</h2>
            <label for="qty">Ticket Quantity:</label>
            <input type="number" id="qty" min="0" placeholder="e.g. 1">
        </form>
        <div class="container-fluid bg-light text-dark rounded p-3 mt-3">
            <h2>Payment Details:</h2>
            <label for="subtotal">Subtotal:</label>
            <div id="replace1">
                <input type="text" readonly>
            </div>
            <p>Admin Fee: PHP 50</p>
            <hr>
            <h3>Total:</h3>
            <div id="replace2">
                <input type="text" readonly>
            </div>
        </div>
        <button class="btn btn-primary center p-2 mt-3 col-md-12" type="button" onclick="checkBill()">Register</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
